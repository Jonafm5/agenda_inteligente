name: agenda_inteligente
description: "Agenda Inteligente - GC Company"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Base de datos
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.42
  path_provider: ^2.1.2
  path: ^1.9.0

  # Estado
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navegación
  go_router: ^14.8.1

  # Calendario
  table_calendar: ^3.1.2

  # Gráficas
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Generadores de código
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true